<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulaire de Test - TP NSI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h2>Inscription au TP NSI</h2>

    <form id="monFormulaire" action="confirmation.php" method="post">

      <!-- Section identité -->
      <section>
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required autofocus />

        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" required />

        <label for="password">Mot de passe :</label>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required />
          <button type="button" id="togglePassword">Afficher</button>
        </div>
      </section>

      <!-- Section NSI -->
      <section class="radio-group">
        <p>Aimes-tu la NSI ?</p>
        <div class="radio-group-inner">
          <label for="like_oui">
            <input type="radio" id="like_oui" name="like" value="Oui" /> Oui
          </label>
          <label for="like_non">
            <input type="radio" id="like_non" name="like" value="Non" /> Non
          </label>
        </div>
      </section>

      <!-- Section présence -->
      <section class="checkbox-group">
        <label for="presence">
          <input type="checkbox" id="presence" name="presence" checked />
          <span id="presenceLabel">Je serai présent(e) à la prochaine réunion</span>
        </label>
      </section>

      <!-- Section matière préférée -->
      <section>
        <label for="prefere">Quelle est votre matière préférée ?</label>
        <select name="prefere" id="prefere">
          <option value="Math">Mathématiques</option>
          <option value="NSI">NSI</option>
          <option value="Francais">Français</option>
        </select>
      </section>

      <!-- Boutons -->
      <div class="buttons">
        <input type="reset" class="reset" value="Réinitialiser" />
        <input type="submit" value="Valider" />
      </div>
    </form>
  </main>

  <script>
    // Gestion de l'affichage et du masquage du mot de passe
    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('togglePassword');

    togglePasswordButton.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePasswordButton.textContent = 'Cacher';
      } else {
        passwordInput.type = 'password';
        togglePasswordButton.textContent = 'Afficher';
      }
    });
  </script>
</body>
</html>
